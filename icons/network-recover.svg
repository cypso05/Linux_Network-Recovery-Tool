<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e3f2fd;stop-opacity:0.95"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="56" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M64 20 L90 30 L90 55 C90 75 80 88 64 95 C48 88 38 75 38 55 L38 30 L64 20Z" 
        fill="url(#shield)" stroke="#1565c0" stroke-width="1.5"/>
  <!-- Network signal waves -->
  <path d="M50 70 Q57 60 64 70" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M44 78 Q54 63 64 78" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M38 86 Q51 66 64 86" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wrench/screwdriver crossed -->
  <line x1="72" y1="52" x2="82" y2="62" stroke="#0d47a1" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="58" x2="82" y2="52" stroke="#0d47a1" stroke-width="3" stroke-linecap="round"/>
  <circle cx="82" cy="52" r="4" fill="none" stroke="#0d47a1" stroke-width="2.5"/>
  <!-- Checkmark -->
  <path d="M54 58 L60 66 L74 50" fill="none" stroke="#4caf50" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small decorative dots -->
  <circle cx="38" cy="50" r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="90" cy="75" r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="92" cy="40" r="1.5" fill="#ffffff" opacity="0.2"/>
</svg>