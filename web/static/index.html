<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Recovery Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="icon">🌐</span>
                <h1>Network Recovery Tool</h1>
            </div>
            <div class="status-badge" id="statusBadge">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">Checking...</span>
            </div>
        </header>

        <nav>
            <button class="btn btn-primary" onclick="runAction('status')">
                <span class="icon">📊</span> Status
            </button>
            <button class="btn btn-success" onclick="runAction('diagnose')">
                <span class="icon">🔍</span> Diagnose
            </button>
            <button class="btn btn-warning" onclick="runAction('repair')">
                <span class="icon">🔧</span> Repair
            </button>
            <button class="btn btn-info" onclick="runAction('snapshot')">
                <span class="icon">💾</span> Snapshot
            </button>
            <button class="btn btn-danger" onclick="clearOutput()">
                <span class="icon">🗑️</span> Clear
            </button>
        </nav>

        <div class="layers" id="layers">
            <span class="layer" data-layer="1">Physical</span>
            <span class="layer" data-layer="2">Link</span>
            <span class="layer" data-layer="3">IP</span>
            <span class="layer" data-layer="4">Routing</span>
            <span class="layer" data-layer="5">Gateway</span>
            <span class="layer" data-layer="6">Internet</span>
            <span class="layer" data-layer="7">DNS</span>
            <span class="layer" data-layer="8">HTTPS</span>
            <span class="layer" data-layer="9">NetworkManager</span>
            <span class="layer" data-layer="10">Virtualization</span>
            <span class="layer" data-layer="11">Kubernetes</span>
        </div>

        <div class="output" id="output">
            <div class="placeholder">Click an action to begin</div>
        </div>

        <div class="progress-container" id="progressContainer" style="display:none">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="progress-text" id="progressText">0%</span>
        </div>

        <footer>
            <span>v2.0.0</span>
            <span id="connectionStatus">● Connected</span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
