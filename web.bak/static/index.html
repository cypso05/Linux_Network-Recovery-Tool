<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Recovery Tool</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
    <header>
        <h1>🛜 Network Recovery Tool</h1>
        <div class="quick-status" id="quickStatus">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Checking...</span>
        </div>
    </header>
    <main>
        <aside class="sidebar">
            <button class="btn" onclick="doAction('status')">📊 Status</button>
            <button class="btn primary" onclick="doAction('diagnose')">🔍 Diagnose</button>
            <button class="btn warning" onclick="doAction('repair')">🔧 Repair</button>
            <button class="btn" onclick="doAction('snapshot')">💾 Snapshot</button>
        </aside>
        <section class="output">
            <div class="layers" id="layers">
                <span class="layer" data-l="1">Phy</span>
                <span class="layer" data-l="2">Link</span>
                <span class="layer" data-l="3">IP</span>
                <span class="layer" data-l="4">Route</span>
                <span class="layer" data-l="5">GW</span>
                <span class="layer" data-l="6">Inet</span>
                <span class="layer" data-l="7">DNS</span>
                <span class="layer" data-l="8">TLS</span>
                <span class="layer" data-l="9">NM</span>
                <span class="layer" data-l="10">VM</span>
                <span class="layer" data-l="11">K8s</span>
            </div>
            <div class="log" id="log"><div class="placeholder">Click an action to begin</div></div>
            <div class="progress-wrap" id="progressWrap" style="display:none">
                <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
                <span class="progress-pct" id="progressPct">0%</span>
            </div>
        </section>
    </main>
    <footer><span>v2.0.0</span><span id="connStatus">● Connected</span></footer>
</div>
<script src="app.js"></script>
</body>
</html>
